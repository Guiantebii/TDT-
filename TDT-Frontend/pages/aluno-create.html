<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Aluno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">

    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link active fw-semibold" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-tablet"></i> Tablets</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-sim"></i> Chips</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-arrow-left-right"></i> Devolução</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-tools"></i> Manutenção</a></li>

        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">Novo Aluno</h2>
        <small class="text-muted">Preencha os dados para cadastrar um aluno</small>
    </div>

    <div class="card shadow-lg p-4">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Nome</label>
                <input id="nome" class="form-control" placeholder="Digite o nome">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">EOL</label>
                <input id="eol" class="form-control" placeholder="Digite o EOL">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Turma</label>
                <input id="turma" class="form-control" placeholder="Ex: 3A">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Data de Nascimento</label>
                <input id="dataNasc" type="date" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Telefone 1</label>
                <input id="tel1" class="form-control" placeholder="(11) 99999-9999">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Telefone 2</label>
                <input id="tel2" class="form-control" placeholder="Opcional">
            </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">

            <button class="btn btn-outline-secondary"
                    onclick="window.location.href='alunos.html'">
                Cancelar
            </button>

            <button class="btn btn-primary px-4"
                    onclick="salvar()">
                <i class="bi bi-check-lg"></i> Salvar
            </button>

        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 TDT
</footer>

<script src="../js/aluno-create.js"></script>
</body>
</html>
