<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Tablet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">

    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active fw-semibold" href="tablets.html">
                    <i class="bi bi-tablet"></i> Tablets
                </a>
            </li>

        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">Novo Tablet</h2>
        <small class="text-muted">Preencha os dados para cadastrar um tablet</small>
    </div>

    <div class="card shadow-lg p-4">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">IMEI</label>
                <input id="imei" class="form-control" placeholder="Digite o IMEI">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Número de Série</label>
                <input id="ns" class="form-control" placeholder="Digite o número de série">
            </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">

            <button class="btn btn-outline-secondary"
                    onclick="window.location.href='tablets.html'">
                Cancelar
            </button>

            <button class="btn btn-primary px-4"
                    onclick="salvar()">
                <i class="bi bi-check-lg"></i> Salvar
            </button>

        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 TDT
</footer>

<script src="../js/tablet-create.js"></script>
</body>
</html>
