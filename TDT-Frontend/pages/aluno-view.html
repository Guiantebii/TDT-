<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Aluno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link active fw-semibold" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-tablet"></i> Tablets</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-sim"></i> Chips</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-arrow-left-right"></i> Devolução</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-tools"></i> Manutenção</a></li>

        </ul>
    </div>
</nav>


<div class="container mt-5">


    <div class="mb-4">
        <h2 class="fw-bold">Detalhes do Aluno</h2>
        <small class="text-muted">Visualização completa do aluno selecionado</small>
    </div>


    <div class="card shadow-lg p-4">

    
        <h5 class="mb-3 text-primary">
            <i class="bi bi-person"></i> Informações Básicas
        </h5>

        <div class="row mb-4">

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">Nome</small>
                    <div id="nome" class="fw-semibold fs-5"></div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">EOL</small>
                    <div id="eol" class="fw-semibold fs-5"></div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">Turma</small>
                    <div id="turma" class="fw-semibold fs-5"></div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">Data de Nascimento</small>
                    <div id="dataNasc" class="fw-semibold fs-5"></div>
                </div>
            </div>

        </div>

        <hr>


        <h5 class="mb-3 text-primary">
            <i class="bi bi-telephone"></i> Contato
        </h5>

        <div class="row mb-3">

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">Telefone 1</small>
                    <div id="tel1" class="fw-semibold fs-5"></div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="info-box p-3">
                    <small class="text-muted">Telefone 2</small>
                    <div id="tel2" class="fw-semibold fs-5"></div>
                </div>
            </div>

        </div>

    
        <div class="d-flex justify-content-end gap-2 mt-4">

            <button class="btn btn-outline-secondary"
                    onclick="window.location.href='alunos.html'">
                Voltar
            </button>

            <button class="btn btn-primary"
                    onclick="editarAluno()">
                <i class="bi bi-pencil"></i> Editar
            </button>

        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 Sistema de Gestão
</footer>

<script src="aluno-view.js"></script>
</body>
</html>
