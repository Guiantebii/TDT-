<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Tablet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-4">
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active fw-semibold" href="tablets.html">
                    <i class="bi bi-tablet"></i> Tablets
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">Editar Tablet</h2>
        <small class="text-muted">Atualize as informações do tablet</small>
    </div>

    <div class="card shadow-lg p-4">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">IMEI</label>
                <input id="imei" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Número de Série</label>
                <input id="ns" class="form-control">
            </div>

        </div>

        <hr>

        <!-- CHIP ATUAL -->
        <h5 class="text-primary mb-3">
            <i class="bi bi-sim"></i> Chip Atual
        </h5>

        <div class="row mb-3">
            <div class="col-md-6">
                <div class="info-box p-3">
                    <small class="text-muted">ICCID</small>
                    <div id="chipIccid" class="fw-semibold"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-box p-3">
                    <small class="text-muted">Status</small>
                    <div id="chipStatus" class="fw-semibold"></div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <button class="btn btn-success" id="btnTrocarChip">
                <i class="bi bi-arrow-repeat"></i> Trocar Chip
            </button>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
            <button class="btn btn-outline-secondary"
                    onclick="window.location.href='tablets.html'">
                Cancelar
            </button>

            <button id="btnSalvar" class="btn btn-warning px-4">
                <i class="bi bi-check-lg"></i> Atualizar
            </button>
        </div>

    </div>

</div>

<!-- MODAL CHIP -->
<div class="modal fade" id="modalChip">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Trocar Chip</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <select id="selectChip" class="form-select"></select>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-primary" id="btnVincularChip">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white"></div>
</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 Sistema
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/tablet-edit.js"></script>

</body>
</html>
