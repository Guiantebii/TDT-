<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tablets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link fw-semibold" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active fw-semibold" href="tablets.html">
                    <i class="bi bi-tablet"></i> Tablets
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    <i class="bi bi-sim"></i> Chips
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    <i class="bi bi-arrow-left-right"></i> Devolução
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    <i class="bi bi-tools"></i> Manutenção
                </a>
            </li>

        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Tablets</h2>
            <small class="text-muted">Gerencie os tablets cadastrados</small>
        </div>

        <button class="btn btn-primary rounded-pill px-4 shadow-sm"
                onclick="window.location.href='tablet-create.html'">
            <i class="bi bi-plus-lg"></i> Novo Tablet
        </button>
    </div>

    <div class="card shadow-lg border-0">

        <div class="p-3 border-bottom">
            <input id="busca" class="form-control" placeholder="Buscar tablet por IMEI...">
        </div>

        <div class="table-responsive">
            <table class="table align-middle text-center mb-0">
                <thead class="table-light">
                <tr>
                    <th>IMEI</th>
                    <th>Nº Série</th>
                    <th>Chip</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-tablets">
                <tr>
                    <td colspan="5">Carregando...</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<div class="modal fade" id="modalChip">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Vincular Chip</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <label class="form-label">Selecione o Chip</label>
        <select id="selectChip" class="form-select"></select>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-primary" id="btnVincularChip">
          Vincular
        </button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalDelete">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Confirmar exclusão</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Deseja realmente excluir este tablet?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="btnConfirmDelete">Excluir</button>
      </div>

    </div>
  </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white"></div>
</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 TDT
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/tablets.js"></script>

</body>
</html>
