<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Chip</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
    <a class="navbar-brand fw-bold" href="#">Sistema</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link fw-semibold" href="alunos.html">
                    <i class="bi bi-people"></i> Alunos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link  fw-semibold" href="tablets.html">
                    <i class="bi bi-tablet"></i> Tablets
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="chips.html">
                    <i class="bi bi-sim"></i> Chips
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="devolucoes.html">
                    <i class="bi bi-arrow-left-right"></i> Devolução
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="manutencoes.html">
                    <i class="bi bi-tools"></i> Manutenção
                </a>
            </li>

        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">Novo Chip</h2>
        <small class="text-muted">Preencha os dados para cadastrar um chip</small>
    </div>

    <div class="card shadow-lg p-4">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">ICCID</label>
                <input id="iccid" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Status</label>
                <input id="status" class="form-control" placeholder="Ex: ATIVO">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">PIN</label>
                <input id="pin" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">PIN2</label>
                <input id="pin2" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">PUK</label>
                <input id="puk" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">PUK2</label>
                <input id="puk2" class="form-control">
            </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
            <button class="btn btn-outline-secondary"
                    onclick="window.location.href='chips.html'">
                Cancelar
            </button>

            <button id="btnSalvar" class="btn btn-primary px-4">
                <i class="bi bi-check-lg"></i> Salvar
            </button>
        </div>

    </div>
</div>

<footer class="text-center mt-5 mb-3 text-muted small">
    © 2026 TDT
</footer>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toast" class="toast align-items-center text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toast-message"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/chip-create.js"></script>

</body>
</html>
